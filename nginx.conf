server {
    listen 443 ssl;
    server_name cms.sman1ketapang.sch.id;

    # SSL Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/sman1ketapang.sch.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sman1ketapang.sch.id/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3001;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fallback ke MinIO jika ada aset yang dipanggil CMS
    location @minio_cms {
        proxy_pass http://127.0.0.1:9000/datasmanka$uri;
        proxy_set_header Host $http_host;
    }
}
