server {
    listen 80;
    server_name cms.sman1ketapang.sch.id;

    # Agar batas unggah file sama seperti limit Multer backend Anda (misalkan 10M, buat aman kasih 20M)
    client_max_body_size 20M;

    location / {
        proxy_pass http://cms-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Opsi: matikan timeout jika sedang upload file MinIo yang besar
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
}
